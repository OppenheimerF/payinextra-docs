                    email: mehmet@example.com
                  metadata:
                    source: mobile-app
              usdcPolygon:
                summary: Deposit 250 TRY worth of USDC on Polygon
                value:
                  amount: 25000
                  currency: TRY
                  chain: polygon
                  tokenType: usdc
                  merchantReference: ref-abc123
      responses:
        '201':
          description: Deposit created successfully. Customer should send crypto to the assigned address.
          headers:
            X-Idempotency-Key:
              $ref: '#/components/headers/IdempotencyKeyResponse'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CryptoDepositResource'
              examples:
                ethDeposit:
                  summary: ETH deposit created
                  value:
                    depositId: dep_crypto_01HQWE123
                    type: crypto_deposit
                    status: pending
                    chain: eth
                    tokenType: native
                    depositAddress: '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb'
