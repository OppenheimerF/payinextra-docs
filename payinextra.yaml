          description: Issuing bank name.
      additionalProperties: false
    WebhookEvent:
      type: object
      required:
        - event
        - paymentId
        - type
        - status
        - merchantReference
        - amount
        - currency
        - occurredAt
      properties:
        event:
          type: string
          description: |
            Event identifier describing the payment lifecycle change.

            **Deposit Events**:
            - `deposit.pending`: Deposit created, awaiting customer payment
            - `deposit.succeeded`: Customer paid successfully, funds credited to merchant
            - `deposit.failed`: Deposit processing failed
            - `deposit.refunded`: Deposit refunded to customer
            - `deposit.requires_action`: Payment data mismatch, requires manual review/refund

            **Withdrawal Events**:
            - `withdrawal.pending`: Withdrawal requested, awaiting approval
            - `withdrawal.processing`: Withdrawal approved and being processed
            - `withdrawal.succeeded`: Withdrawal completed, funds sent to destination
            - `withdrawal.failed`: Withdrawal processing failed
            - `withdrawal.cancelled`: Withdrawal cancelled by admin or merchant

            **Payout Events**:
            - `payout.pending`: Payout requested, awaiting approval
            - `payout.processing`: Payout approved and being processed
            - `payout.succeeded`: Payout completed, funds sent to destination
            - `payout.failed`: Payout processing failed

            **Crypto Payout Events**:
            - `crypto_payout.pending`: Payout created, awaiting admin approval
            - `crypto_payout.approved`: Payout approved by admin, queued for blockchain processing
            - `crypto_payout.processing`: Transaction being broadcast to blockchain
            - `crypto_payout.succeeded`: Transaction confirmed on blockchain with required confirmations
            - `crypto_payout.failed`: Transaction failed or rejected by admin

            **Crypto Deposit Events**:
            - `crypto_deposit.pending`: Address assigned, awaiting customer to send crypto
            - `crypto_deposit.confirmed`: Transaction detected on blockchain, awaiting confirmations
            - `crypto_deposit.succeeded`: Required confirmations received, balance credited
            - `crypto_deposit.failed`: Deposit failed (wrong amount, network error, etc.)
            - `crypto_deposit.expired`: Deposit expired without payment

            **Crypto Withdrawal Events**:
            - `crypto_withdrawal.pending`: Withdrawal created, queued for blockchain processing
            - `crypto_withdrawal.processing`: Transaction being broadcast to blockchain
            - `crypto_withdrawal.succeeded`: Transaction confirmed on blockchain
            - `crypto_withdrawal.failed`: Transaction failed (insufficient gas, invalid address, etc.)
          enum:
            - deposit.pending
            - deposit.succeeded
            - deposit.failed
            - deposit.refunded
            - deposit.requires_action
            - withdrawal.pending
            - withdrawal.processing
            - withdrawal.succeeded
            - withdrawal.failed
            - withdrawal.cancelled
            - payout.pending
            - payout.processing
            - payout.succeeded
            - payout.failed
            - crypto_payout.pending
            - crypto_payout.approved
            - crypto_payout.processing
            - crypto_payout.succeeded
            - crypto_payout.failed
            - crypto_deposit.pending
            - crypto_deposit.confirmed
            - crypto_deposit.succeeded
            - crypto_deposit.failed
            - crypto_deposit.expired
            - crypto_withdrawal.pending
            - crypto_withdrawal.processing
            - crypto_withdrawal.succeeded
            - crypto_withdrawal.failed
        paymentId:
          type: string
          description: PayinExtra payment identifier referenced in the API.
        type:
          type: string
          enum:
            - deposit
            - withdrawal
            - payout
            - crypto_payout
        status:
          type: string
          description: Latest status of the payment when the webhook was sent.
        paymentMethod:
          type: string
          nullable: true
          description: |
            Deposit payment route when the event relates to a deposit. Currently only `bank_transfer`
            (havale) is active in production.
          enum:
            - bank_transfer
            - credit_card_tr
            - credit_card_international
        merchantReference:
          type: string
          description: Merchant supplied identifier echoed back.
        amount:
          type: integer
          description: Monetary amount in minor currency units.
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        metadata:
          type: object
          additionalProperties:
            type: string
        payoutMethod:
          type: string
          nullable: true
          description: Payout channel used for withdrawals. Currently only `havale` is available.
          enum:
            - havale
        customer:
          description: Customer information associated with the payment.
          nullable: true
          allOf:
            - $ref: '#/components/schemas/Customer'
        occurredAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when PayinExtra emitted the event.
        paymentPageUrl:
          type: string
          format: uri
          nullable: true
          description: Present for deposit events while awaiting completion.
        returnUrl:
          type: string
          format: uri
          nullable: true
          description: Merchant return URL PayinExtra posts the same payload to after redirect.
        chain:
          type: string
          nullable: true
          description: |
            Blockchain network for crypto payouts (only present for crypto_payout events).
            One of: eth, bnb, polygon, tron
          example: eth
        tokenType:
          type: string
          nullable: true
          description: |
            Token type for crypto payouts (only present for crypto_payout events).
            One of: native, usdt, usdc
          example: usdt
        toAddress:
          type: string
          nullable: true
          description: |
            Destination blockchain address for crypto payouts (only present for crypto_payout events).
          example: '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb'
        txHash:
          type: string
          nullable: true
          description: |
            Blockchain transaction hash for crypto payouts (present for crypto_payout events when status is processing/succeeded).
          example: '0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef'
        blockNumber:
          type: integer
          nullable: true
          description: |
            Block number where transaction was included (present for crypto_payout events when confirmed).
          example: 12345678
        confirmations:
          type: integer
          nullable: true
          description: |
            Current number of block confirmations (present for crypto_payout events when processing/succeeded).
          example: 12
        explorerUrl:
          type: string
          format: uri
          nullable: true
          description: |
            Blockchain explorer URL for the transaction (present for crypto_payout events when txHash exists).
          example: 'https://etherscan.io/tx/0x1234...cdef'
        failureCode:
          type: string
          nullable: true
          description: |
            Error code for failed crypto payouts (only present for crypto_payout.failed events).
          example: INSUFFICIENT_GAS
        failureReason:
          type: string
          nullable: true
          description: |
            Human-readable failure reason (only present for crypto_payout.failed events).
          example: 'Insufficient gas in hot wallet'
    ReturnRedirectPayload:
      allOf:
        - $ref: '#/components/schemas/WebhookEvent'
      description: Payload POSTed to the merchant's configured return URL after the customer flow, identical to the webhook body.
    WebhookDelivery:
      type: object
      description: |
        ## Webhook Delivery System

        PayinExtra delivers webhooks via HTTP POST to your configured webhook URL with automatic retry on failure.

        ### Retry Strategy (Exponential Backoff)
        Failed webhook deliveries are automatically retried up to **7 times** (8 total attempts) with increasing delays:

        | Attempt | Delay After Failure |
        |---------|---------------------|
        | 1       | Immediate           |
        | 2       | 3 minutes           |
        | 3       | 5 minutes           |
        | 4       | 15 minutes          |
        | 5       | 30 minutes          |
        | 6       | 1 hour              |
        | 7       | 3 hours             |
        | 8       | 6 hours (final)     |

        ### Request Details
        - **Method**: `POST`
        - **Timeout**: 10 seconds
        - **Content-Type**: `application/json`
        - **Success Criteria**: HTTP status `2xx` within timeout

        ### Security Headers
        Each webhook request includes these headers for verification:

        - `X-Secret-Key`: Your webhook secret (for simple validation)
        - `X-Webhook-Signature`: HMAC-SHA256 signature of request body (for cryptographic validation)
        - `X-Webhook-Event`: Event type (e.g., `deposit.succeeded`)
        - `X-Webhook-Id`: Unique delivery attempt identifier
        - `X-Webhook-Timestamp`: Unix timestamp of delivery attempt
        - `Content-Type`: `application/json`

        ### Verification Options

        **Option 1: Simple Secret Validation (Quick)**
        ```python
        def verify_webhook_simple(request_secret, configured_secret):
            """Compare the X-Secret-Key header with your configured secret"""
            return request_secret == configured_secret
        ```

        **Option 2: HMAC Signature Validation (Recommended - Prevents Tampering)**
        ```python
        import hmac
        import hashlib

        def verify_webhook_hmac(payload_body, signature, secret):
            """Verify HMAC-SHA256 signature to ensure payload wasn't tampered with"""
            expected = hmac.new(
                secret.encode('utf-8'),
                payload_body.encode('utf-8'),
                hashlib.sha256
            ).hexdigest()
            return hmac.compare_digest(expected, signature)

        # Example usage
        secret_key = request.headers.get('X-Secret-Key')
        signature = request.headers.get('X-Webhook-Signature')
        payload_body = request.body

        # Quick validation
        if secret_key != YOUR_WEBHOOK_SECRET:
            return 401  # Unauthorized

        # Secure validation (recommended)
        if not verify_webhook_hmac(payload_body, signature, YOUR_WEBHOOK_SECRET):
            return 401  # Signature mismatch
        ```

        ### Best Practices
        1. **Respond quickly**: Return `2xx` status immediately, process async
        2. **Verify authenticity**: Validate `X-Secret-Key` or `X-Webhook-Signature` header
        3. **Use HMAC for security**: HMAC validation prevents payload tampering
        4. **Idempotency**: Use `paymentId` to prevent duplicate processing
        5. **Monitor deliveries**: Check webhook logs in merchant panel
        6. **Manual retry**: Failed webhooks can be manually retried from panel

        ### Failure Handling
        - After 8 failed attempts, delivery stops and status becomes `failed`
        - You can manually retry from merchant panel or admin panel
        - Check webhook delivery logs for error messages and HTTP responses
      properties:
        deliveryId:
          type: string
          description: Unique identifier for this delivery attempt
        webhookId:
          type: string
          description: Merchant webhook configuration ID
        attemptCount:
          type: integer
          description: Current attempt number (1-8)
          minimum: 1
          maximum: 8
        status:
          type: string
          enum:
            - pending
            - delivered
            - failed
          description: |
            Current delivery status:
            - `pending`: Queued or being retried
            - `delivered`: Successfully delivered (2xx response received)
            - `failed`: All retry attempts exhausted
        lastAttemptedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of most recent delivery attempt
        deliveredAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when delivery succeeded
        lastError:
          type: string
          nullable: true
          description: Error message from most recent failed attempt
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Machine readable error identifier.
          example: validation_error
        message:
          type: string
          description: Human readable summary of the failure.
          example: Amount must be greater than zero.
        details:
          type: array
          description: Optional list of validation or processing issues.
          items:
            $ref: '#/components/schemas/ErrorDetail'
        requestId:
          type: string
          description: PayinExtra request identifier for support traces.
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: Field name associated with the error, when applicable.
        issue:
          type: string
          description: Machine readable issue category.
          example: MIN_VALUE
        message:
          type: string
          description: Human readable detail about the problem.
    CurrencyCode:
      type: string
      enum:
        - TRY
      description: ISO-4217 three-letter currency code. PayinExtra currently supports only Turkish Lira (TRY).
      example: TRY
  responses:
    BadRequest:
      description: Invalid payload or malformed request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid:
              summary: Amount is missing
              value:
                error: validation_error
                message: amount is a required field
                details:
                  - field: amount
                    issue: REQUIRED
                    message: amount is a required field
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    Unauthorized:
      description: Missing or invalid authentication headers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              summary: Authentication failed
              value:
                error: unauthorized
                message: Invalid authentication credentials.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    NotFound:
      description: Resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing:
              summary: Payment does not exist
              value:
                error: not_found
                message: Payment pay_01H9YE1N5CB3X7S9HESY7Y5XGK was not found.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    Conflict:
      description: Request conflicts with existing resources.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            duplicate:
              summary: Duplicate idempotency key
              value:
                error: conflict
                message: X-Idempotency-Key has already been used for a different payload.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    UnprocessableEntity:
      description: Validation rules failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation:
              summary: Validation errors on destination
              value:
                error: validation_error
                message: Destination validation failed.
                details:
                  - field: destination.iban
                    issue: INVALID
                    message: IBAN format is invalid.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    ValidationError:
      description: Request validation failed due to invalid parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation:
              summary: Invalid query parameters
              value:
                error: validation_error
                message: Query parameter validation failed.
                details:
                  - field: status
                    issue: INVALID_ENUM
                    message: Invalid status value. Must be one of pending, approved, processing, succeeded, failed.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    Forbidden:
      description: Access to resource is forbidden for this merchant.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              summary: Feature not enabled for merchant
              value:
                error: forbidden
                message: This feature is not enabled for your merchant account.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    RateLimited:
      description: Too many requests were sent in a short time.
      headers:
        Retry-After:
          description: Seconds until the next allowed request.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            throttled:
              summary: Merchant exceeded rate limits
              value:
                error: rate_limited
                message: Too many requests. Try again later.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
    InternalError:
      description: Unexpected error on PayinExtra servers.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            error:
              summary: Unknown exception
              value:
                error: internal_error
                message: An unexpected error occurred. Please retry later.
                requestId: req_01H9YEAXTGDCQW8QF6YF3B8S5N
  parameters:
    PaymentId:
