        Card payment details for credit card payments. Provide only when using
        `credit_card_tr` or `credit_card_international` payment methods.
        Card data is stored encrypted and will be hashed for risk analysis.
      properties:
        cardNumber:
          type: string
          description: Full card PAN (13-19 digits). Will be encrypted at rest.
          example: '4242424242424242'
