    post:
      tags:
        - Crypto Deposits
      summary: Create a cryptocurrency deposit
      description: |
        Create a new cryptocurrency deposit request. The system assigns a unique wallet address for the customer to send crypto to.
        The blockchain scanner automatically monitors for incoming transactions and updates the deposit status.

        **Important Notes:**
        - Customer sends cryptocurrency to the assigned address
        - System monitors blockchain for incoming transactions via scanner service
        - Deposit credited to merchant balance after required confirmations
        - Each deposit gets a unique address to prevent confusion
        - Addresses may be reused after deposit completion (wallet pool management)

        **Status Flow:**
        1. `pending` - Address assigned, waiting for customer to send crypto
        2. `confirmed` - Transaction detected on blockchain, awaiting confirmations
        3. `succeeded` - Required confirmations received, balance credited to merchant
        4. `failed` - Deposit failed (wrong amount, expired, or other error)
        5. `expired` - Deposit expired (customer didn't send within time limit)

        **Blockchain Support:**
        - **Ethereum (eth)**: ETH, USDT-ERC20, USDC-ERC20
        - **BNB Smart Chain (bnb)**: BNB, USDT-BEP20, USDC-BEP20
        - **Polygon (polygon)**: MATIC, USDT-Polygon, USDC-Polygon
        - **Tron (tron)**: TRX, USDT-TRC20, USDC-TRC20

        **Amount Conversion:**
        - You specify the fiat amount (TRY) you want to receive
        - System calculates equivalent crypto amount using current market price
        - Customer must send exact crypto amount shown
        - Price locked for deposit duration (typically 30-60 minutes)
      security:
        - ApiKeyAuth: []
          MerchantIdAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CryptoDepositRequest'
            examples:
              ethNative:
                summary: Deposit 1000 TRY worth of ETH
                value:
                  amount: 100000
                  currency: TRY
                  chain: eth
                  tokenType: native
                  merchantReference: order-12345
                  customer:
                    name: Ahmet Yılmaz
                    email: ahmet@example.com
                    phone: '+905551234567'
                    reference: customer-001
                  metadata:
                    orderId: '12345'
                    productId: 'premium-package'
