        - Crypto Withdrawals
      summary: Create a cryptocurrency withdrawal
      description: |
        Create a new cryptocurrency withdrawal request to send crypto from your merchant balance to a customer's wallet address.
        This is typically used for refunds or payouts to customers in cryptocurrency.

        **Important Notes:**
        - Sends crypto from merchant balance to customer's wallet address
        - Different from crypto-payouts (which send to merchant's own configured address with admin approval)
        - Withdrawal processed immediately after balance validation (no admin approval required)
        - You specify fiat amount (TRY), system calculates equivalent crypto amount
        - Platform may charge commission based on your merchant settings

        **Status Flow:**
        1. `pending` - Created, queued for blockchain processing
        2. `processing` - Transaction being broadcast to blockchain
        3. `succeeded` - Transaction confirmed on blockchain with required confirmations
        4. `failed` - Transaction failed (insufficient gas, invalid address, network error)

        **Blockchain Support:**
        - **Ethereum (eth)**: ETH, USDT-ERC20, USDC-ERC20
        - **BNB Smart Chain (bnb)**: BNB, USDT-BEP20, USDC-BEP20
        - **Polygon (polygon)**: MATIC, USDT-Polygon, USDC-Polygon
        - **Tron (tron)**: TRX, USDT-TRC20, USDC-TRC20

        **Amount Conversion:**
        - You specify the fiat amount (TRY) to send
        - System calculates equivalent crypto amount using current market price
        - Customer receives exact crypto amount calculated
        - Price determined at withdrawal creation time

        **Gas Fees:**
        - Platform covers gas fees for blockchain transactions
        - Commission (if configured) is deducted from withdrawal amount
        - Net amount sent to customer = amount - commission
      security:
        - ApiKeyAuth: []
          MerchantIdAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
